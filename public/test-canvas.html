<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Fond Animé - Digita</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:#232526; min-height:100vh; }
    h1 { color:#FFD700; text-align:center; margin-top:2em; font-family:sans-serif; }
    #debug { color:#fff; text-align:center; margin-top:1em; }
  </style>
</head>
<body>
  <h1>Test Animation de Fond JS</h1>
  <div id="debug">Chargement du JS...</div>
  <script src="/assets/js/main.js"></script>
  <script>
    setTimeout(function() {
      var canvas = document.getElementById('bg-animated-canvas');
      var debug = document.getElementById('debug');
      if(canvas) {
        debug.textContent = 'Canvas animé détecté !';
        canvas.style.border = '3px solid lime';
      } else {
        debug.textContent = 'Canvas NON détecté ! (JS non chargé ou erreur de chemin)';
        document.body.style.background = '#900';
      }
    }, 1200);
  </script>
</body>
</html>
