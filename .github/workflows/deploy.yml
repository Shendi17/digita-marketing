name: Deploy to OVH

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permet le déclenchement manuel

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Récupérer tout l'historique pour vérifications
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    
    - name: Verify Git repository integrity
      run: |
        echo "🔍 Vérification de l'intégrité du dépôt Git..."
        git fsck --full || echo "⚠️ Avertissement: problèmes Git détectés"
        echo "✅ Vérification terminée"
        
    - name: Validate PHP syntax
      run: |
        echo "🔍 Validation de la syntaxe PHP..."
        ERROR_COUNT=0
        while IFS= read -r file; do
          if ! php -l "$file" > /dev/null 2>&1; then
            echo "❌ Erreur dans: $file"
            php -l "$file"
            ERROR_COUNT=$((ERROR_COUNT + 1))
          fi
        done < <(find app/ public/ includes/ -name "*.php")
        
        if [ $ERROR_COUNT -gt 0 ]; then
          echo "❌ $ERROR_COUNT fichier(s) avec erreurs de syntaxe"
          exit 1
        fi
        echo "✅ Tous les fichiers PHP sont valides"
    
    - name: Pre-deployment cleanup check
      run: |
        echo "🧹 Vérification pré-déploiement..."
        echo "Fichiers qui seront déployés:"
        find app/ public/ includes/ config/ -type f | wc -l
        echo "✅ Prêt pour le déploiement"
    
    - name: Deploy via FTP
      id: deploy
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USER }}
        password: ${{ secrets.FTP_PASS }}
        server-dir: ${{ secrets.FTP_PATH }}
        dangerous-clean-slate: false  # Ne jamais tout supprimer
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/vendor/**
          **/.env
          **/logs/**
          **/cache/**
          **/backups/**
          **/tests/**
          **/*.sh
          **/.env.deploy
          **/deploy.ps1
          **/deploy.log
          **/.github/**
          **/scripts/deploy/**
          **/DEPLOIEMENT.md
          **/CORRECTION_ERREURS.md
      continue-on-error: true
    
    - name: Verify deployment
      if: steps.deploy.outcome == 'success'
      run: |
        echo "✅ Déploiement FTP réussi"
        echo "🔍 Vérification du site..."
        
        # Attendre quelques secondes pour que les fichiers soient disponibles
        sleep 5
        
        # Tester l'accessibilité du site
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://digita.tonyalpha80.com || echo "000")
        
        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
          echo "✅ Site accessible (HTTP $HTTP_CODE)"
        else
          echo "⚠️ Site retourne HTTP $HTTP_CODE"
        fi
    
    - name: Deployment failed - Diagnostics
      if: steps.deploy.outcome == 'failure'
      run: |
        echo "❌ Le déploiement FTP a échoué"
        echo "📋 Diagnostics:"
        echo "1. Vérifiez que les secrets FTP sont correctement configurés"
        echo "2. Vérifiez que le serveur FTP est accessible"
        echo "3. Vérifiez que le chemin FTP_PATH existe"
        echo "4. Consultez les logs ci-dessus pour plus de détails"
        exit 1
          
    - name: Notification
      if: always()
      run: |
        echo "═══════════════════════════════════════"
        if [ "${{ steps.deploy.outcome }}" == "success" ]; then
          echo "✅ DÉPLOIEMENT RÉUSSI"
          echo "🌐 Site: https://digita.tonyalpha80.com"
          echo "📊 Admin: https://digita.tonyalpha80.com/admin/dashboard"
          echo "═══════════════════════════════════════"
          echo "📝 Actions recommandées:"
          echo "  1. Vérifier le site en production"
          echo "  2. Tester les fonctionnalités critiques"
          echo "  3. Consulter les logs si nécessaire"
        else
          echo "❌ ÉCHEC DU DÉPLOIEMENT"
          echo "═══════════════════════════════════════"
          echo "🔧 Solutions possibles:"
          echo "  1. Exécuter: .\\scripts\\deploy\\repair-ovh-git.ps1 -AutoFix"
          echo "  2. Vérifier les secrets GitHub"
          echo "  3. Consulter les logs ci-dessus"
        fi
        echo "═══════════════════════════════════════"
