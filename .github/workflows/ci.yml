name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        
    - name: Validate composer.json
      run: |
        if [ -f "composer.json" ]; then
          composer validate
        fi
        
    - name: Run Tests
      run: |
        if [ -f "phpunit.phar" ]; then
          php phpunit.phar --testdox
        fi
